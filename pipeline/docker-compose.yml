services:
  pipeline:
    build:
      context: .
      # Dockerfile.pull = prebuilt image from GHCR, Dockerfile = full local build.
      dockerfile: ${NOPE_DOCKERFILE:-Dockerfile}
      args:
        NOPE_IMAGE_TAG: "${NOPE_IMAGE_TAG:-}"
      labels:
        nope.image-hash: "${NOPE_IMAGE_HASH:-}"
    image: nope
    entrypoint: /app/scripts/build.sh
    volumes:
      - ./app:/app:ro
      - ${VAULT_PATH}:/vault:ro
      - ${NOPE_BUILD_PATH:-./build}:/build
    working_dir: /build