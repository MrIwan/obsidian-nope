# Build the pipeline image and push it to GHCR — on version tags and on
# deletable test-* tags. Multi-arch on native runners (QEMU would take hours
# for the merman source build): each arch pushes by digest, the merge job
# stitches the manifest and attests its provenance.
name: Docker image

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "test-*"

env:
  IMAGE: ghcr.io/mriwan/nope-pipeline

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Prepare platform slug
        run: echo "PLATFORM_SLUG=${{ matrix.platform }}" | tr '/' '-' >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: pipeline
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ env.PLATFORM_SLUG }}
          cache-to: type=gha,mode=max,scope=${{ env.PLATFORM_SLUG }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ env.PLATFORM_SLUG }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      packages: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Tag name = image tag (0.6.0 or test-*), stitched from the per-arch digests.
      - name: Create multi-arch manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            --tag "$IMAGE:${{ github.ref_name }}" \
            $(printf "$IMAGE@sha256:%s " *)

      - name: Resolve manifest digest
        id: digest
        run: |
          digest=$(docker buildx imagetools inspect "$IMAGE:${{ github.ref_name }}" \
            --format '{{json .Manifest}}' | jq -r .digest)
          echo "digest=$digest" >> "$GITHUB_OUTPUT"

      # Provenance lands in the registry: gh attestation verify oci://<image> -R MrIwan/obsidian-nope
      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true
