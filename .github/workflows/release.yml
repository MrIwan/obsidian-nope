name: Release Obsidian plugin

# Version tags only — test-* tags belong to docker-image.yml and must not create releases.
on:
  push:
    tags: ["[0-9]+.[0-9]+.[0-9]+"]

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css

      - name: Verify attestation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify main.js --repo "$GITHUB_REPOSITORY"
          gh attestation verify styles.css --repo "$GITHUB_REPOSITORY"

      - name: Create draft release with assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          tag: ${{ github.ref_name }}
        run: |
          gh release create "$tag" \
            --title="$tag" \
            --draft \
            main.js manifest.json styles.css
